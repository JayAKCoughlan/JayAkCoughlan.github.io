<ul class="menu-list list-separator nav navbar-nav well well-primary {{ page.layout }}">
    {% for link in site.data.social %}
        <li class="is-family-monospace">
            <a target="_blank" href="{{ link.link }}" class="is-size-5"><i class="fa {{ link.icon }} is-size-4"></i>{{ link.name }} </a>   
        </li>
    {% endfor %}
</ul>
