---
layout: default
title: Job History
---
<div class="job-history content">
    <div class="list-group">
      {% for post in site.companies reversed %}
      <div class="box">
          <!-- <div class="least-content">{{ post.date | date_to_string }}</div>-->
            <a href="{{ post.url | prepend: site.baseurl }}">
                <span class="icon-text has-text-info-60">
                    <span class="icon">
                        <i class="fa-solid fa-building-user"></i>
                    </span>
                    <span><h1 class="title is-4 mt-0 is-family-monospace is-clickable has-text-info-60">{{ post.title }}</h1></span>
                </span>
            </a>
            <p>Start Date: {{ post.date | date_to_string }}</p>
      </div>
      <div class="list-group-separator"></div>
      {% endfor %}
    </div>
</div>
